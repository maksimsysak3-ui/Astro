<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EMBERFALL — The Hollow Crown</title>
<style>
  :root{
    --gold:#e8c170; --gold-dim:#9c7b3a; --ink:#0b0d14; --ash:#161a26;
    --ember:#ff6b35; --ember-soft:#ff9a5c; --blood:#c0392b; --mana:#4aa3ff;
    --life:#5ad17a; --panel:#11141f; --line:#2a3142; --text:#d8dae6; --mute:#8a90a6;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%; background:#000; overflow:hidden;
    font-family:"Segoe UI",system-ui,-apple-system,sans-serif; color:var(--text);
    -webkit-user-select:none; user-select:none; touch-action:none;}
  #stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#05060a;}
  canvas{image-rendering:pixelated; background:#0a0c14; box-shadow:0 0 80px rgba(0,0,0,.9);}
  /* ---------- Overlay UI ---------- */
  .screen{position:fixed; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; z-index:20;
    background:radial-gradient(ellipse at 50% 30%, rgba(20,24,40,.6), rgba(2,3,6,.96));}
  .screen.on{display:flex; animation:fade .5s ease;}
  @keyframes fade{from{opacity:0} to{opacity:1}}
  .title-logo{font-size:84px; font-weight:900; letter-spacing:14px; color:var(--gold);
    text-shadow:0 0 30px rgba(232,193,112,.5), 0 6px 0 #5a4012, 0 10px 40px rgba(255,107,53,.4);
    transform:scaleY(1.1);}
  .title-sub{margin-top:6px; font-size:20px; letter-spacing:10px; color:var(--ember-soft);
    text-transform:uppercase; opacity:.9;}
  .menu{margin-top:48px; display:flex; flex-direction:column; gap:4px; width:340px;}
  .mbtn{position:relative; padding:14px 22px; font-size:20px; letter-spacing:3px; color:var(--mute);
    background:linear-gradient(90deg, rgba(40,46,66,0), rgba(40,46,66,.25)); border:none;
    text-align:left; cursor:pointer; transition:.18s; border-left:3px solid transparent; font-weight:600;}
  .mbtn:hover,.mbtn.sel{color:var(--gold); border-left:3px solid var(--ember);
    background:linear-gradient(90deg, rgba(255,107,53,.18), rgba(40,46,66,.05)); padding-left:34px;}
  .mbtn:disabled{opacity:.3; cursor:not-allowed;}
  .foot{position:fixed; bottom:18px; font-size:12px; color:var(--mute); letter-spacing:2px;}
  .panel{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:26px;
    box-shadow:0 20px 60px rgba(0,0,0,.7);}
  h2.head{font-size:26px; letter-spacing:6px; color:var(--gold); margin-bottom:18px; text-transform:uppercase;}
  /* class cards */
  .cards{display:flex; gap:18px; margin:20px 0;}
  .card{width:230px; background:var(--ash); border:1px solid var(--line); border-radius:12px;
    padding:20px; cursor:pointer; transition:.2s; text-align:center;}
  .card:hover,.card.sel{border-color:var(--ember); transform:translateY(-6px); box-shadow:0 12px 30px rgba(255,107,53,.25);}
  .card .ic{font-size:54px; margin-bottom:10px;}
  .card h3{color:var(--gold); letter-spacing:3px; margin-bottom:8px;}
  .card p{font-size:13px; color:var(--mute); line-height:1.5; min-height:72px;}
  .card .stats{margin-top:12px; font-size:12px; color:var(--ember-soft); text-align:left;}
  .row{display:flex; gap:10px; margin-top:18px;}
  .btn{padding:12px 28px; background:linear-gradient(180deg,var(--ember),var(--blood));
    border:none; color:#fff; font-weight:700; letter-spacing:2px; border-radius:8px; cursor:pointer;
    font-size:15px; transition:.15s;}
  .btn:hover{filter:brightness(1.15); transform:translateY(-2px);}
  .btn.ghost{background:none; border:1px solid var(--line); color:var(--mute);}
  .btn.ghost:hover{color:var(--gold); border-color:var(--gold);}
  /* HUD */
  #hud{position:fixed; inset:0; pointer-events:none; z-index:10; display:none;}
  #hud.on{display:block;}
  .bars{position:fixed; top:14px; left:14px; width:280px;}
  .bar{height:18px; background:#000a; border:1px solid var(--line); border-radius:4px; margin-bottom:6px;
    position:relative; overflow:hidden;}
  .bar .fill{height:100%; transition:width .2s; }
  .bar .lab{position:absolute; inset:0; font-size:11px; line-height:18px; text-align:center;
    text-shadow:0 1px 2px #000; letter-spacing:1px;}
  .bar.hp .fill{background:linear-gradient(90deg,#7a1f17,var(--blood));}
  .bar.mp .fill{background:linear-gradient(90deg,#1f4c7a,var(--mana));}
  .bar.xp{height:8px;} .bar.xp .fill{background:linear-gradient(90deg,#8a6b22,var(--gold));}
  .hud-top{position:fixed; top:14px; right:14px; text-align:right;}
  .coin{font-size:16px; color:var(--gold); letter-spacing:1px;}
  .area-name{font-size:13px; color:var(--mute); letter-spacing:2px; margin-top:4px;}
  #minimap{position:fixed; top:70px; right:14px; border:1px solid var(--line); background:#000a; border-radius:6px;}
  /* ability bar */
  .abilities{position:fixed; bottom:16px; left:50%; transform:translateX(-50%); display:flex; gap:8px;}
  .slot{width:54px; height:54px; background:#0c0f18; border:1px solid var(--line); border-radius:8px;
    position:relative; display:flex; align-items:center; justify-content:center; font-size:26px;}
  .slot .key{position:absolute; top:2px; left:4px; font-size:10px; color:var(--mute);}
  .slot .cd{position:absolute; inset:0; background:rgba(0,0,0,.7); border-radius:8px;
    display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--gold);}
  .slot.ready{border-color:var(--ember-soft); box-shadow:0 0 10px rgba(255,107,53,.4);}
  /* toast / floating */
  #toasts{position:fixed; bottom:90px; left:50%; transform:translateX(-50%); z-index:30;
    display:flex; flex-direction:column; align-items:center; gap:6px; pointer-events:none;}
  .toast{background:#0c0f18ee; border:1px solid var(--line); padding:8px 18px; border-radius:20px;
    font-size:14px; letter-spacing:1px; animation:rise 2.6s forwards;}
  @keyframes rise{0%{opacity:0; transform:translateY(14px)} 12%{opacity:1; transform:translateY(0)}
    80%{opacity:1} 100%{opacity:0; transform:translateY(-14px)}}
  /* dialogue */
  #dialogue{position:fixed; left:50%; bottom:26px; transform:translateX(-50%); width:680px;
    background:linear-gradient(180deg,#10131fee,#0a0c14ee); border:1px solid var(--line);
    border-radius:12px; padding:20px 24px; z-index:25; display:none; box-shadow:0 16px 40px #000a;}
  #dialogue.on{display:block;}
  #dialogue .who{color:var(--gold); letter-spacing:3px; font-weight:700; margin-bottom:8px; font-size:15px;}
  #dialogue .txt{font-size:16px; line-height:1.6; min-height:48px; color:var(--text);}
  #dialogue .opts{margin-top:14px; display:flex; flex-direction:column; gap:6px;}
  #dialogue .opt{padding:8px 14px; background:#0c0f18; border:1px solid var(--line); border-radius:6px;
    cursor:pointer; pointer-events:auto; font-size:14px; transition:.15s;}
  #dialogue .opt:hover{border-color:var(--ember); color:var(--gold); padding-left:22px;}
  #dialogue .cont{margin-top:10px; font-size:12px; color:var(--mute); text-align:right;}
  /* inventory / menus overlay */
  #panelScreen{z-index:26;}
  .invwrap{display:flex; gap:24px;}
  .grid{display:grid; grid-template-columns:repeat(6,52px); gap:6px;}
  .cell{width:52px; height:52px; background:#0c0f18; border:1px solid var(--line); border-radius:6px;
    display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; position:relative;}
  .cell:hover{border-color:var(--ember);}
  .cell .ct{position:absolute; bottom:1px; right:3px; font-size:10px; color:var(--mute);}
  .cell.rare{box-shadow:inset 0 0 0 1px var(--mana);}
  .cell.epic{box-shadow:inset 0 0 0 1px #b56bff;}
  .cell.legend{box-shadow:inset 0 0 0 1px var(--gold);}
  .equipcol{width:200px;}
  .eqslot{display:flex; align-items:center; gap:10px; padding:8px; background:#0c0f18;
    border:1px solid var(--line); border-radius:6px; margin-bottom:6px;}
  .eqslot .ic{font-size:24px; width:30px; text-align:center;}
  .eqslot .nm{font-size:13px;}
  .eqslot .sl{font-size:10px; color:var(--mute); text-transform:uppercase; letter-spacing:1px;}
  #tooltip{position:fixed; z-index:40; background:#0a0c14f5; border:1px solid var(--gold);
    border-radius:8px; padding:12px; width:240px; font-size:13px; pointer-events:none; display:none;
    box-shadow:0 10px 30px #000a;}
  #tooltip .tn{color:var(--gold); font-weight:700; margin-bottom:4px;}
  #tooltip .td{color:var(--mute); font-style:italic; margin:6px 0; line-height:1.4;}
  #tooltip .ts{color:var(--life);}
  .statline{display:flex; justify-content:space-between; font-size:14px; padding:4px 0; border-bottom:1px solid #1a2030;}
  .statline span:last-child{color:var(--gold);}
  /* skill tree */
  .tree{display:flex; gap:30px; margin-top:10px;}
  .branch{flex:1;}
  .branch h4{color:var(--ember-soft); text-align:center; letter-spacing:2px; margin-bottom:14px;}
  .node{background:#0c0f18; border:1px solid var(--line); border-radius:8px; padding:10px;
    margin-bottom:10px; cursor:pointer; transition:.15s;}
  .node:hover{border-color:var(--ember);}
  .node.owned{border-color:var(--life); background:#0e1a12;}
  .node.locked{opacity:.45;}
  .node .nh{display:flex; justify-content:space-between; font-size:14px; color:var(--gold);}
  .node .nd{font-size:12px; color:var(--mute); margin-top:4px; line-height:1.4;}
  .tabs{display:flex; gap:4px; margin-bottom:16px;}
  .tab{padding:8px 20px; background:#0c0f18; border:1px solid var(--line); border-radius:6px 6px 0 0;
    cursor:pointer; letter-spacing:2px; font-size:13px;}
  .tab.sel{background:var(--ash); border-color:var(--ember); color:var(--gold);}
  .cinematic{max-width:760px; text-align:center;}
  .cinematic p{font-size:19px; line-height:1.9; color:#c7cbdb; margin:0; opacity:0;
    animation:lineIn 1.2s forwards;}
  @keyframes lineIn{to{opacity:1}}
  .fade-black{position:fixed; inset:0; background:#000; z-index:50; pointer-events:none; opacity:0; transition:opacity .6s;}
  .fade-black.on{opacity:1; pointer-events:all;}
  .vignette{position:fixed; inset:0; z-index:9; pointer-events:none;
    box-shadow:inset 0 0 240px rgba(0,0,0,.85);}
  .dmgflash{position:fixed; inset:0; z-index:8; pointer-events:none; background:radial-gradient(ellipse at center, transparent 50%, rgba(192,57,43,.5)); opacity:0; transition:opacity .1s;}
  .hint{font-size:13px; color:var(--mute); margin-top:10px; line-height:1.6;}
  kbd{background:#1a2030; border:1px solid var(--line); border-radius:4px; padding:1px 6px; font-size:12px; color:var(--gold);}
  #bossbar{position:fixed; top:16px; left:50%; transform:translateX(-50%); width:520px; display:none;}
  #bossbar.on{display:block;}
  #bossbar .nm{text-align:center; color:var(--blood); letter-spacing:4px; font-weight:700; margin-bottom:4px; text-shadow:0 0 12px rgba(192,57,43,.6);}
  #bossbar .bar{height:14px;}
  #bossbar .fill{background:linear-gradient(90deg,#3a0d08,var(--blood),#ff5a3c);}
</style>
</head>
<body>
<div id="stage"><canvas id="game" width="960" height="540"></canvas></div>
<div class="vignette"></div>
<div class="dmgflash" id="dmgflash"></div>

<!-- ===== TITLE ===== -->
<div class="screen on" id="titleScreen">
  <div class="title-logo">EMBERFALL</div>
  <div class="title-sub">The Hollow Crown</div>
  <div class="menu" id="titleMenu"></div>
  <div class="foot">↑↓ navigate · ENTER select · v1.0 — an original creation</div>
</div>

<!-- ===== CLASS SELECT ===== -->
<div class="screen" id="classScreen">
  <div class="panel">
    <h2 class="head">Choose Your Path</h2>
    <div class="cards" id="classCards"></div>
    <input id="heroName" placeholder="Name your hero…" maxlength="14"
      style="width:100%;padding:10px;background:#0c0f18;border:1px solid var(--line);border-radius:6px;color:var(--gold);font-size:16px;letter-spacing:2px;text-align:center;">
    <div class="row" style="justify-content:space-between;">
      <button class="btn ghost" onclick="Game.toTitle()">◀ Back</button>
      <button class="btn" id="beginBtn" onclick="Game.beginStory()">Begin ▶</button>
    </div>
  </div>
</div>

<!-- ===== CINEMATIC ===== -->
<div class="screen" id="cineScreen">
  <div class="cinematic" id="cineText"></div>
  <div class="foot">click or press ENTER to continue</div>
</div>

<!-- ===== OPTIONS / CREDITS ===== -->
<div class="screen" id="infoScreen">
  <div class="panel" style="width:560px;">
    <h2 class="head" id="infoHead">Options</h2>
    <div id="infoBody"></div>
    <div class="row"><button class="btn ghost" onclick="Game.toTitle()">◀ Back</button></div>
  </div>
</div>

<!-- ===== HUD ===== -->
<div id="hud">
  <div class="bars">
    <div class="bar hp"><div class="fill" id="hpFill"></div><div class="lab" id="hpLab"></div></div>
    <div class="bar mp"><div class="fill" id="mpFill"></div><div class="lab" id="mpLab"></div></div>
    <div class="bar xp"><div class="fill" id="xpFill"></div></div>
  </div>
  <div class="hud-top">
    <div class="coin" id="coinLab">⛁ 0</div>
    <div class="area-name" id="areaLab">—</div>
    <div class="area-name" id="lvlLab">Lv 1</div>
  </div>
  <canvas id="minimap" width="150" height="150"></canvas>
  <div class="abilities" id="abilityBar"></div>
</div>
<div id="bossbar"><div class="nm" id="bossName"></div><div class="bar"><div class="fill" id="bossFill"></div></div></div>

<div id="toasts"></div>
<div id="dialogue"></div>
<div id="tooltip"></div>
<div class="fade-black" id="fadeBlack"></div>

<!-- ===== PANEL OVERLAY (inventory / skills / pause) ===== -->
<div class="screen" id="panelScreen">
  <div class="panel" style="width:720px;min-height:460px;">
    <div class="tabs" id="panelTabs"></div>
    <div id="panelContent"></div>
    <div class="row"><button class="btn ghost" onclick="Game.closePanel()">Close (ESC / I)</button></div>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
   EMBERFALL — The Hollow Crown
   A single-file original action-RPG. No external assets; everything —
   art, audio, world, combat — is generated in code.
   ===================================================================== */

/* ------------------------- Audio engine ------------------------- */
const Audio2 = (() => {
  let ctx, master, musicGain, sfxGain, musicTimer=null, enabled=true;
  let unlocked=false, pendingMood=null, pendingVol=0.6;
  // The browser blocks audio until the player interacts with the page.
  // Nothing touches the AudioContext until unlock() runs inside a real gesture.
  function unlock(){
    if(!unlocked){ unlocked=true; init(); }
    if(ctx && ctx.state==='suspended') ctx.resume();
    if(pendingMood) startMusic(pendingMood);
  }
  function init(){
    if(ctx || !unlocked) return;
    ctx = new (window.AudioContext||window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value=pendingVol; master.connect(ctx.destination);
    musicGain = ctx.createGain(); musicGain.gain.value=0.35; musicGain.connect(master);
    sfxGain = ctx.createGain(); sfxGain.gain.value=0.7; sfxGain.connect(master);
  }
  function tone(freq, dur, type='square', gain=0.2, dest){
    if(!ctx||!enabled) return;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(0,ctx.currentTime);
    g.gain.linearRampToValueAtTime(gain,ctx.currentTime+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
    o.connect(g); g.connect(dest||sfxGain); o.start(); o.stop(ctx.currentTime+dur);
  }
  function noise(dur, gain=0.3){
    if(!ctx||!enabled) return;
    const n=ctx.createBufferSource(), buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
    n.buffer=buf;
    const g=ctx.createGain(); g.gain.value=gain;
    const f=ctx.createBiquadFilter(); f.type='highpass'; f.frequency.value=600;
    n.connect(f); f.connect(g); g.connect(sfxGain); n.start();
  }
  const sfx={
    swing(){ noise(0.12,0.18); tone(180,0.1,'sawtooth',0.12);},
    hit(){ noise(0.1,0.25); tone(90,0.12,'square',0.2);},
    enemyHit(){ tone(140,0.08,'square',0.12); noise(0.06,0.15);},
    cast(){ tone(420,0.18,'sine',0.18); tone(640,0.2,'sine',0.12);},
    fire(){ noise(0.2,0.2); tone(260,0.2,'sawtooth',0.16);},
    coin(){ tone(880,0.06,'square',0.15); tone(1320,0.08,'square',0.12);},
    loot(){ tone(660,0.08,'sine',0.15); tone(990,0.12,'sine',0.12);},
    level(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,0.25,'triangle',0.2),i*90));},
    hurt(){ tone(220,0.18,'sawtooth',0.22); noise(0.1,0.2);},
    die(){ [330,247,165,110].forEach((f,i)=>setTimeout(()=>tone(f,0.3,'sawtooth',0.18),i*110));},
    ui(){ tone(520,0.05,'square',0.1);},
    select(){ tone(720,0.07,'square',0.12);},
    quest(){ [659,880,1100].forEach((f,i)=>setTimeout(()=>tone(f,0.2,'triangle',0.16),i*110));},
    door(){ noise(0.3,0.18); tone(120,0.3,'sine',0.16);},
    portal(){ for(let i=0;i<6;i++) setTimeout(()=>tone(300+i*120,0.18,'sine',0.12),i*60);},
    boss(){ tone(60,0.6,'sawtooth',0.3); tone(90,0.6,'square',0.18);},
  };
  // procedural ambient music: simple evolving arpeggio with mood
  const moods={
    town:{root:220, scale:[0,3,5,7,10], tempo:520, type:'sine', bass:55},
    field:{root:196, scale:[0,2,4,7,9], tempo:460, type:'triangle', bass:49},
    dungeon:{root:174, scale:[0,2,3,7,8], tempo:600, type:'sine', bass:43},
    boss:{root:147, scale:[0,1,3,6,7], tempo:300, type:'sawtooth', bass:36},
  };
  let curMood='town', step=0;
  function startMusic(mood){
    pendingMood=mood; curMood=mood;
    if(!unlocked || !ctx){ return; }          // remember it; real start happens on unlock
    if(ctx.state==='suspended') ctx.resume();
    if(musicTimer) clearInterval(musicTimer); step=0;
    const m=moods[mood]||moods.field;
    musicTimer=setInterval(()=>{
      if(!enabled) return;
      const sc=m.scale, note=m.root*Math.pow(2,(sc[step%sc.length]+12*((step/ (sc.length*2)|0)%2))/12);
      tone(note,0.5,m.type,0.12,musicGain);
      if(step%4===0) tone(m.bass,0.9,'triangle',0.16,musicGain);
      if(step%8===4) tone(m.root*Math.pow(2,7/12),0.7,'sine',0.08,musicGain);
      step++;
    }, m.tempo);
  }
  function setEnabled(v){ enabled=v; if(!v&&musicTimer){clearInterval(musicTimer); musicTimer=null;} }
  function setVol(v){ pendingVol=v; if(master) master.gain.value=v; }
  return {init,unlock,sfx,startMusic,setEnabled,setVol,get enabled(){return enabled;}};
})();

/* ------------------------- Utility ------------------------- */
const rand=(a,b)=>a+Math.random()*(b-a);
const randi=(a,b)=>Math.floor(rand(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const dist=(x1,y1,x2,y2)=>Math.hypot(x2-x1,y2-y1);
const lerp=(a,b,t)=>a+(b-a)*t;
const now=()=>performance.now();
function chance(p){return Math.random()<p;}

/* ------------------------- Data: Classes ------------------------- */
const CLASSES={
  warden:{ name:"Ember Warden", icon:"⚔️", color:"#ff6b35",
    desc:"A frontline blade-bearer wreathed in flame. Heavy strikes, high vitality, and a shield-break charge.",
    hp:140, mp:50, str:9, agi:5, int:3, speed:2.4,
    abilities:["cleave","charge","emberguard"] },
  shade:{ name:"Voidshade", icon:"🗡️", color:"#b56bff",
    desc:"A nimble assassin who dances through shadow. Quick daggers, evasive blink, poison that lingers.",
    hp:100, mp:70, str:6, agi:9, int:5, speed:3.1,
    abilities:["flurry","blink","venom"] },
  oracle:{ name:"Stormoracle", icon:"🔮", color:"#4aa3ff",
    desc:"A wielder of raw aether. Ranged bolts, a frost nova to control crowds, and a healing ward.",
    hp:90, mp:120, str:4, agi:6, int:10, speed:2.6,
    abilities:["bolt","nova","ward"] },
};

/* ------------------------- Data: Abilities ------------------------- */
const ABILITIES={
  cleave:{ name:"Cleave", icon:"🪓", key:"Q", cd:1.2, cost:0, range:46, desc:"A wide arc that strikes all foes ahead.",
    cast(p,g){ Audio2.sfx.swing(); g.meleeArc(p, p.facing, 46, 1.4*p.power(), 70); g.shake(4);} },
  charge:{ name:"Charge", icon:"💨", key:"E", cd:5, cost:12, range:160, desc:"Hurtle forward, knocking back and stunning the first enemies hit.",
    cast(p,g){ Audio2.sfx.fire(); p.dashVec={x:Math.cos(p.facing),y:Math.sin(p.facing)}; p.dashTime=0.32; p.dashSpeed=520; p.dashDmg=2.0*p.power(); g.shake(6);} },
  emberguard:{ name:"Emberguard", icon:"🛡️", key:"R", cd:14, cost:20, desc:"Cloak in fire: take 60% less damage and burn nearby foes for 5s.",
    cast(p,g){ Audio2.sfx.cast(); p.buffs.guard=5; p.buffs.burnAura=5; g.ring(p.x,p.y,p.color);} },

const WEAPONS=[

const ARMORS=[
  {n:"Ashplate Hauberk", ic:"🛡️", base:5, slot:"armor"},
  {n:"Shadewoven Cloak", ic:"🧥", base:3, slot:"armor"},
  {n:"Runed Vestments", ic:"👘", base:4, slot:"armor"},
];
const TRINKETS=[
  {n:"Emberheart Locket", ic:"📿", base:0, slot:"trinket"},
  {n:"Voidglass Ring", ic:"💍", base:0, slot:"trinket"},
  {n:"Stormcaller Charm", ic:"🔆", base:0, slot:"trinket"},
];
const AFFIXES=[
  {n:"of Vigor", stat:"hp", val:[12,40]},
  {n:"of the Adept", stat:"mp", val:[8,30]},
  {n:"of Fury", stat:"str", val:[1,4]},
  {n:"of the Cat", stat:"agi", val:[1,4]},
  {n:"of Insight", stat:"int", val:[1,4]},
  {n:"of Warding", stat:"armor", val:[1,5]},
  {n:"of Wrath", stat:"dmg", val:[2,7]},
  {n:"of the Bear", stat:"hp", val:[20,55]},
  {n:"of the Sage", stat:"int", val:[2,6]},
  {n:"of Carnage", stat:"dmg", val:[4,10]},
];
function rollRarity(luck=0){
  let total=RARITIES.reduce((s,r)=>s+r.w,0), r=Math.random()*total;
  // luck nudges toward higher rarity
  const arr=RARITIES.map(x=>({...x, w:x.w + (x.key!=='common'?luck*x.w*0.1:0)}));
  total=arr.reduce((s,x)=>s+x.w,0); r=Math.random()*total;
  for(const x of arr){ if((r-=x.w)<=0) return RARITIES.find(o=>o.key===x.key); }
  return RARITIES[0];
}
let ITEM_ID=1;
function makeItem(level, forceSlot, luck=0){
  const rarity=rollRarity(luck);
  let table = forceSlot==='weapon'?WEAPONS : forceSlot==='armor'?ARMORS : forceSlot==='trinket'?TRINKETS :
    pick([WEAPONS,WEAPONS,ARMORS,TRINKETS]);
  const base=pick(table);
  const it={ id:ITEM_ID++, name:base.n, icon:base.ic, slot:base.slot, rarity:rarity.key,
    rarityColor:rarity.color, stats:{}, ilvl:level };
  // primary stat
  const primary=Math.round((base.base + level*0.8) * rarity.mult);
  if(base.slot==='weapon') it.stats.dmg=primary;
  else if(base.slot==='armor') it.stats.armor=primary;
  // affixes
  const pool=[...AFFIXES];
  for(let i=0;i<rarity.affixes;i++){
    const a=pool.splice(randi(0,pool.length-1),1)[0]; if(!a) break;
    const v=randi(a.val[0],a.val[1])+Math.floor(level*0.4);
    it.stats[a.stat]=(it.stats[a.stat]||0)+v;
    if(i===0 && rarity.key!=='common') it.name += " "+a.n;
  }
  if(rarity.key==='legend'){
    it.legendary=pick([
      "Lifesteal: heal 8% of damage dealt.",
      "Ember: attacks ignite foes.",
      "Swift: +20% movement speed.",
      "Greed: enemies drop +50% gold.",
    ]);
  }
  return it;
}

        let aff=0; for(const slot in this.equip){ const it=this.equip[slot]; if(it&&it.stats.dmg) aff+=it.stats.dmg; }
        let mult=this.skills.overload?1.2:1;
        return (base + wdmg + aff*0.5 + this.level*1.1)*mult; },
      armorVal(){ let a=0; for(const slot in this.equip){ const it=this.equip[slot]; if(it){ if(it.stats.armor)a+=it.stats.armor; } } return a + this.level*0.5; },
      moveSpeed(){ let s=this.speedBase; if(this.hasLegendary('Swift')) s*=1.2; if(this.skills.fleet) s*=1.12; return s; },
      hasLegendary(word){ for(const slot in this.equip){ const it=this.equip[slot]; if(it&&it.legendary&&it.legendary.startsWith(word)) return true;} return false; },
      heal(v){ this.hp=clamp(this.hp+v,0,this.maxhp); spawnFloater(this.x,this.y-18,'+'+Math.round(v),'#5ad17a'); },
      recomputeMax(){
        const c=CLASSES[this.class];
        let hpB=0,mpB=0,strB=0,agiB=0,intB=0;
        for(const slot in this.equip){ const it=this.equip[slot]; if(it){ const s=it.stats;
          hpB+=s.hp||0; mpB+=s.mp||0; strB+=s.str||0; agiB+=s.agi||0; intB+=s.int||0; } }
        if(this.skills.toughness) hpB+=40;
        if(this.skills.focus) mpB+=30;
        if(this.skills.ascendant){ strB+=3; agiB+=3; intB+=3; }
        this.strBonus=strB; this.agiBonus=agiB; this.intBonus=intB;
        this.maxhp=c.hp + (this.level-1)*16 + hpB + (this.str+strB)*2;
        this.maxmp=c.mp + (this.level-1)*8 + mpB + (this.int+intB)*2;
        this.hp=clamp(this.hp,0,this.maxhp); this.mp=clamp(this.mp,0,this.maxmp);
      },
    };
  }

  function gainXP(v){
    player.xp+=v;
    while(player.xp>=player.xpNext){
      player.xp-=player.xpNext; player.level++; player.skillPts++;
      player.str+=2; player.agi+=1; player.int+=1;
      player.xpNext=Math.round(player.xpNext*1.35+30);
      player.recomputeMax(); player.hp=player.maxhp; player.mp=player.maxmp;
      Audio2.sfx.level(); toast(`⬆ Level ${player.level}! +1 skill point`, '#e8c170');
      for(let i=0;i<24;i++) particle(player.x,player.y,'#e8c170',rand(-2.5,2.5),rand(-3,-0.5));
      shake(5);
    }
    updateHUD();
  }

  /* ===================================================================
     WORLD GENERATION
     =================================================================== */
  // A grid map: 0 floor, 1 wall, 2 decoration(floor), 3 door/exit
  function buildTown(){
    const w=40,h=30, grid=[];
    for(let y=0;y<h;y++){ grid[y]=[]; for(let x=0;x<w;x++){
      grid[y][x]= (x===0||y===0||x===w-1||y===h-1)?1:0;
    }}
    // some buildings (walls)
    function rect(x,y,rw,rh){ for(let j=y;j<y+rh;j++) for(let i=x;i<x+rw;i++) if(grid[j]&&grid[j][i]!==undefined) grid[j][i]=1; }
    rect(5,5,5,4); rect(28,5,6,5); rect(6,20,6,4); rect(26,19,7,5); rect(17,7,5,3);
    const map={ grid, w, h, biome:{name:"Lastlight — The Final Refuge", floor:"#1c2230", wall:"#0e1420", accent:"#e8c170", music:"town"}, isTown:true };
    return map;
  }

  function genDungeon(biomeKey, depth){
    const B=BIOMES[biomeKey];
    const w=randi(46,60), h=randi(40,52), grid=[];
    for(let y=0;y<h;y++){ grid[y]=[]; for(let x=0;x<w;x++) grid[y][x]=1; }
    // random rooms connected by corridors
    const rooms=[];
    const count=randi(8+depth,12+depth);
    for(let i=0;i<count;i++){
      const rw=randi(5,10), rh=randi(5,9);
      const rx=randi(1,w-rw-1), ry=randi(1,h-rh-1);
      for(let y=ry;y<ry+rh;y++) for(let x=rx;x<rx+rw;x++) grid[y][x]=0;
      rooms.push({x:rx+(rw>>1), y:ry+(rh>>1), rw,rh,rx,ry});
    }
    // connect rooms (carve L corridors)
    for(let i=1;i<rooms.length;i++){
      let a=rooms[i-1], b=rooms[i];
      let x=a.x,y=a.y;
      while(x!==b.x){ grid[y][x]=0; grid[y][clamp(x+1,0,w-1)]=0; x+=x<b.x?1:-1; }
      while(y!==b.y){ grid[y][x]=0; grid[clamp(y+1,0,h-1)][x]=0; y+=y<b.y?1:-1; }
    }
    // decorations
    for(let i=0;i<w*h*0.02;i++){ const x=randi(1,w-2),y=randi(1,h-2); if(grid[y][x]===0) grid[y][x]=2; }
    const map={ grid, w, h, biome:B, biomeKey, depth, rooms, isTown:false };
    return map;
  }

  function isSolidTile(t){ return t===1; }
  function tileAt(map, px, py){ const tx=Math.floor(px/TILE), ty=Math.floor(py/TILE);
    if(!map.grid[ty]||map.grid[ty][tx]===undefined) return 1; return map.grid[ty][tx]; }
  function solidAt(px,py){ return isSolidTile(tileAt(world, px,py)); }

  function randFloorTile(map){
    for(let tries=0;tries<400;tries++){ const x=randi(1,map.w-2), y=randi(1,map.h-2);
      if(map.grid[y][x]===0) return {x:x*TILE+TILE/2, y:y*TILE+TILE/2}; }
    return {x:map.w*TILE/2, y:map.h*TILE/2};
  }

  let dungeonState=null;
  function enterDungeon(biomeKey){
    fadeTransition(()=>{
      dungeonState={ biomeKey, depth:1, maxDepth:3, cleared:false };
      loadDungeonFloor(biomeKey, 1);
      Audio2.sfx.door();
    });
  }
  function loadDungeonFloor(biomeKey, depth){
    world=genDungeon(biomeKey, depth); clearEntities();
    dungeonState.depth=depth;
    const start=randFloorTile(world); player.x=start.x; player.y=start.y;
    // spawn enemies scaled to depth + player level
    const B=BIOMES[biomeKey];
    const num=randi(8+depth*2, 12+depth*3);
    for(let i=0;i<num;i++){
      let pos; do{ pos=randFloorTile(world); }while(dist(pos.x,pos.y,player.x,player.y)<260);
      spawnEnemy(pick(B.enemies), pos.x, pos.y, player.level+depth-1);
    }
    // chests
    const chestN=randi(2,4);
    for(let i=0;i<chestN;i++){ const p=randFloorTile(world); chests.push({x:p.x,y:p.y,opened:false}); }
    // exit portal: either deeper, or boss on final floor
    if(depth>=dungeonState.maxDepth){
      let bp; do{ bp=randFloorTile(world); }while(dist(bp.x,bp.y,player.x,player.y)<360);
      const bossKey=Object.keys(BOSSES).find(k=>BOSSES[k].biome===biomeKey);
      portals=[ mkBossPortal(bp.x,bp.y, bossKey) ];
    } else {
      let ep; do{ ep=randFloorTile(world); }while(dist(ep.x,ep.y,player.x,player.y)<300);
      portals=[ mkPortal(ep.x,ep.y,'deeper','Descend deeper…', B.accent) ];
    }
    Audio2.startMusic(B.music);
    document.getElementById('areaLab').textContent=`${B.name} — Floor ${depth}/${dungeonState.maxDepth}`;
    cam.x=player.x-W/2; cam.y=player.y-H/2;
    if(depth===1) toast(pick(TIPS), '#8a90a6');
    updateHUD();
  }

  // ---- Endless Rift: infinite, ever-harder floors of mixed biomes ----
  function enterEndless(){
    fadeTransition(()=>{ Audio2.sfx.door();
      dungeonState={ biomeKey:'endless', depth:1, maxDepth:Infinity, cleared:false, endless:true };
      loadEndlessFloor(1);
    });
  }
  function loadEndlessFloor(depth){
    const biomeKey=pick(['ember','hollow','frost']);
    world=genDungeon(biomeKey, Math.min(depth,6)); clearEntities();
    dungeonState.depth=depth; dungeonState.biomeKey=biomeKey;
    const start=randFloorTile(world); player.x=start.x; player.y=start.y;
    const B=BIOMES[biomeKey];
    const num=randi(10+depth, 16+depth*2);
    const eLvl=player.level+depth; // scales without bound
    for(let i=0;i<num;i++){ let pos; do{ pos=randFloorTile(world); }while(dist(pos.x,pos.y,player.x,player.y)<260);
      spawnEnemy(pick(B.enemies), pos.x, pos.y, eLvl); }
    // every 5th floor: a random boss as a wall of difficulty
    if(depth%5===0){ const bk=pick(Object.keys(BOSSES)); spawnBoss(bk); Audio2.startMusic('boss'); }
    else Audio2.startMusic(B.music);
    for(let i=0;i<randi(2,4);i++){ const p=randFloorTile(world); chests.push({x:p.x,y:p.y,opened:false}); }
    let ep; do{ ep=randFloorTile(world); }while(dist(ep.x,ep.y,player.x,player.y)<300);
    portals=[ mkPortal(ep.x,ep.y,'endlessDeeper','Descend to floor '+(depth+1), B.accent),
              mkPortal(start.x+TILE,start.y,'town','Retreat to Lastlight','#e8c170') ];
    document.getElementById('areaLab').textContent=`The Endless Rift — Floor ${depth}`;
    cam.x=player.x-W/2; cam.y=player.y-H/2;
    if(depth===1) toast("The Endless Rift has no bottom. Every floor, the dark grows hungrier. How deep can you go?", '#ff3b2f');
    else if(depth%5===0) toast(`Floor ${depth}: a Warden stirs in the dark!`, '#c0392b');
    else if(depth%10===0) toast(`Floor ${depth} — few have descended this far. The Rift remembers your name.`, '#e8c170');
    else toast(`Floor ${depth} · enemies scale to level ${player.level+depth}`, '#8a90a6');
    updateHUD();
  }

  function mkNPC(x,y,icon,name,role){ return {x,y,icon,name,role,r:14}; }
  function mkPortal(x,y,target,label,color,locked=false){ return {x,y,target,label,color,r:22,anim:0,locked}; }
  function mkBossPortal(x,y,bossKey){ return {x,y,target:'boss',bossKey,label:'⚠ '+BOSSES[bossKey].name,color:BOSSES[bossKey].color,r:24,anim:0,locked:false}; }

  /* ===================================================================
     COMBAT helpers exposed to abilities
     =================================================================== */
  function meleeArc(p, ang, range, dmg, arcDeg){
    const arc=arcDeg*Math.PI/180;
    const targets = boss? [...enemies, boss] : enemies;
    targets.forEach(e=>{
      if(e.hp<=0) return;
      const d=dist(p.x,p.y,e.x,e.y);
      if(d<range+e.r){
        const a=Math.atan2(e.y-p.y, e.x-p.x);
        let diff=Math.abs(((a-ang+Math.PI)%(2*Math.PI))-Math.PI);
        if(diff<arc/2){ damageEnemy(e, dmg, p);
          e.knock.x+=Math.cos(a)*3; e.knock.y+=Math.sin(a)*3; }
      }
    });
    // visual swipe
    for(let i=0;i<6;i++){ const a=ang+rand(-arc/2,arc/2);
      particle(p.x+Math.cos(a)*range*0.6, p.y+Math.sin(a)*range*0.6, p.color, Math.cos(a)*1.5, Math.sin(a)*1.5); }
    p.swipe={ang, range, arc, t:0.18};
  }
  function projectile(x,y,ang,speed,dmg,color,pierce,owner){
    projectiles.push({x,y,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed,dmg,color,pierce,owner,
      friendly:owner===player, r:6, life:1.2, hits:[]});
  }
  function nova(x,y,radius,color,dmg){
    const targets= boss?[...enemies,boss]:enemies;
    targets.forEach(e=>{ if(e.hp>0 && dist(x,y,e.x,e.y)<radius+e.r){ damageEnemy(e,dmg,player); } });
    for(let i=0;i<28;i++){ const a=rand(0,6.28); particle(x,y,color,Math.cos(a)*rand(2,5),Math.sin(a)*rand(2,5)); }
    ring(x,y,color); shake(5);
  }
  function cloud(x,y,color,dps,dur){ particles.push({cloud:true,x,y,color,dps,dur,r:34,t:0}); }
  function enemiesInRange(x,y,rad){ const t=boss?[...enemies,boss]:enemies; return t.filter(e=>e.hp>0&&dist(x,y,e.x,e.y)<rad+e.r); }
  function ring(x,y,color){ floaters.push({ring:true,x,y,color,r:6,max:60,t:0}); }

  function damageEnemy(e, dmg, src){
    if(e.hp<=0) return;
    let crit=chance(0.12+player.agi*0.004+(player.skills.precision?0.15:0));
    let final=dmg*(crit?1.8:1);
    if(player.hasLegendary('Ember')) e.poison=Math.max(e.poison,3);
    e.hp-=final; e.hitFlash=0.12;
    spawnFloater(e.x, e.y-e.r-6, Math.round(final), crit?'#ff6b35':'#ffffff', crit);
    if(player.hasLegendary('Lifesteal')) player.heal(final*0.08);
    Audio2.sfx.enemyHit();
    for(let i=0;i<4;i++) particle(e.x,e.y,e.color,rand(-1.5,1.5),rand(-2,0));
    if(e.hp<=0) killEnemy(e);
  }
  function killEnemy(e){
    if(e.dead) return; e.dead=true;
    for(let i=0;i<14;i++) particle(e.x,e.y,e.color,rand(-3,3),rand(-3,1));
    if(e.isBoss){ onBossDeath(e); return; }
    enemies=enemies.filter(x=>x!==e);
    gainXP(e.xp);
    let g=randi(e.gold[0],e.gold[1]); if(player.hasLegendary('Greed')) g=Math.round(g*1.5);
    spawnDrop(e.x,e.y,'gold',g);
    // item drop chance
    if(chance(0.22)) spawnDrop(e.x,e.y,'item', makeItem(e.lvl, null, player.skills.fortune?2:0));
    // quest tracking
    player.killCount[e.type]=(player.killCount[e.type]||0)+1;
    checkQuestProgress('kill', e.type);
    Audio2.sfx.die();
  }
  function spawnDrop(x,y,kind,payload){
    drops.push({x:x+rand(-8,8),y:y+rand(-8,8),kind,payload,r:9,anim:rand(0,6.28),life:30,
      vx:rand(-1,1),vy:rand(-1,1)});
  }
  function spawnFloater(x,y,text,color,big){ floaters.push({x,y,text:''+text,color,t:0,vy:-1.1,big}); }

  /* ---------------- Damage to player ---------------- */
  function hurtPlayer(dmg, srcx, srcy){
    if(player.iframes>0||player.buffs.guard&&false) return;
    let mult=1; if(player.buffs.guard>0) mult=0.4;
    let armor=player.armorVal();
    let final=Math.max(1, dmg*mult - armor*0.5);
    if(player.skills.bulwark) final*=0.85;
    player.hp-=final; player.iframes=0.5;
    spawnFloater(player.x,player.y-20,Math.round(final),'#c0392b');
    Audio2.sfx.hurt(); flashScreen(); shake(6);
    if(srcx!==undefined){ const a=Math.atan2(player.y-srcy,player.x-srcx); player.x+=Math.cos(a)*8; player.y+=Math.sin(a)*8; }
    if(player.hp<=0) die();
    updateHUD();
  }
  function die(){
    state='dead'; player.hp=0; Audio2.sfx.die(); Audio2.startMusic('dungeon');
    toast("You have fallen… press ENTER to awaken in Lastlight.", '#c0392b');
  }
  function respawn(){
    player.hp=player.maxhp*0.6; player.mp=player.maxmp*0.5;
    // lose some gold
    const lost=Math.floor(player.gold*0.15); player.gold-=lost;
    enterTown(); state='play';
    toast(`You awaken in Lastlight, ${lost} gold lighter.`, '#e8c170');
    saveGame();
  }

  /* ===================================================================
     ABILITIES
     =================================================================== */
  function useAbility(slot){
    const key=player.abilitySlots[slot]; if(!key) return;
    const ab=ABILITIES[key];
    if(player.cds[slot]>0){ Audio2.sfx.ui(); return; }
    if(player.mp<ab.cost){ toast("Not enough aether!", '#4aa3ff'); return; }
    player.mp-=ab.cost; player.cds[slot]=ab.cd*(player.skills.haste?0.85:1);
    ab.cast(player, GameAPI);
    updateHUD();
  }
  function quickPotion(k){
    if(k==='1'){ if(player.potions.heal>0 && player.hp<player.maxhp){ player.potions.heal--; player.heal(player.maxhp*0.5); Audio2.sfx.loot(); }
      else if(player.potions.heal<=0) toast("No health potions!", '#c0392b'); }
    if(k==='2'){ if(player.potions.mana>0 && player.mp<player.maxmp){ player.potions.mana--; player.mp=clamp(player.mp+player.maxmp*0.5,0,player.maxmp); spawnFloater(player.x,player.y-18,'+aether','#4aa3ff'); Audio2.sfx.loot(); }
      else if(player.potions.mana<=0) toast("No mana potions!", '#4aa3ff'); }
    updateHUD();
  }

  // basic attack (held)
  function basicAttack(){
    if(player.attackCd>0) return;
    const spd=0.42 - player.agi*0.012; player.attackCd=clamp(spd,0.16,0.5);
    const ang=player.facing;
    const cls=player.class;
    if(cls==='oracle'){ // ranged auto
      Audio2.sfx.cast(); projectile(player.x,player.y,ang,460,0.7*player.power(),'#9fe8ff',false,player); player.mp=clamp(player.mp-1,0,player.maxmp);
    } else {
      Audio2.sfx.swing(); meleeArc(player, ang, cls==='shade'?34:42, (cls==='shade'?0.65:0.9)*player.power(), cls==='shade'?70:60);
    }
  }

  /* ===================================================================
     INTERACTION
     =================================================================== */
  function interact(){
    // nearest interactable
    let best=null,bd=60;
    npcs.forEach(n=>{ const d=dist(player.x,player.y,n.x,n.y); if(d<bd){bd=d;best={type:'npc',obj:n};} });
    portals.forEach(p=>{ const d=dist(player.x,player.y,p.x,p.y); if(d<bd+10){bd=d;best={type:'portal',obj:p};} });
    chests.forEach(c=>{ if(c.opened)return; const d=dist(player.x,player.y,c.x,c.y); if(d<bd){bd=d;best={type:'chest',obj:c};} });
    if(!best){ // pick up nearby drops
      collectNearbyDrops(); return; }
    if(best.type==='npc') talkTo(best.obj);
    else if(best.type==='portal') usePortal(best.obj);
    else if(best.type==='chest') openChest(best.obj);
  }
  function openChest(c){
    c.opened=true; Audio2.sfx.loot(); ring(c.x,c.y,'#e8c170');
    const g=randi(15,40); spawnDrop(c.x,c.y,'gold',g);
    spawnDrop(c.x,c.y,'item', makeItem((world.depth||1)+player.level, null, 2));
    if(chance(0.5)) spawnDrop(c.x,c.y,'potion','heal');
    toast("You found a cache!", '#e8c170');
  }
  function usePortal(p){
    if(p.locked){ toast("This rift is sealed. You need more shards to enter.", '#c0392b'); Audio2.sfx.ui(); return; }
    Audio2.sfx.portal();
    if(p.target==='deeper'){ fadeTransition(()=> loadDungeonFloor(dungeonState.biomeKey, dungeonState.depth+1)); }
    else if(p.target==='endlessDeeper'){ fadeTransition(()=> loadEndlessFloor(dungeonState.depth+1)); }
    else if(p.target==='boss'){ fadeTransition(()=>{ loadDungeonFloor(dungeonState.biomeKey, dungeonState.depth); enemies=[]; chests=[]; portals=[]; spawnBoss(p.bossKey); Audio2.startMusic('boss'); }); }
    else if(p.target==='town'){ fadeTransition(enterTown); }
    else if(p.target==='endless'){ enterEndless(); }
    else { // entering a realm from town
      if(p.target==='ember'||p.target==='hollow'||p.target==='frost') enterDungeon(p.target);
    }
  }
  function onBossDeath(b){
    document.getElementById('bossbar').classList.remove('on');
    gainXP(b.xp); spawnDrop(b.x,b.y,'gold',randi(b.gold[0],b.gold[1]));
    for(let i=0;i<3;i++) spawnDrop(b.x+rand(-30,30),b.y+rand(-30,30),'item',makeItem(player.level+5,null,4));
    player.killCount[b.key]=(player.killCount[b.key]||0)+1;
    const bx=b.x, by=b.y; boss=null;
    // In the Endless Rift, wardens are just obstacles — no shards, the descent continues.
    if(dungeonState&&dungeonState.endless){
      const B=BIOMES[dungeonState.biomeKey];
      toast(`A Warden falls. The Rift goes deeper still…`, '#e8c170');
      Audio2.startMusic(B.music); shake(14);
      for(let i=0;i<40;i++) particle(bx,by,'#e8c170',rand(-5,5),rand(-6,2));
      portals=[ mkPortal(bx,by,'endlessDeeper','Descend to floor '+(dungeonState.depth+1), B.accent),
                mkPortal(bx+TILE,by,'town','Retreat to Lastlight','#e8c170') ];
      saveGame(); return;
    }
    player.shards++; checkQuestProgress('boss', b.key);
    b.x=bx; b.y=by;
    toast(`✦ ${b.name.split(',')[0]} is vanquished! Shard reclaimed (${player.shards}/3).`, '#e8c170');
    for(let i=0;i<60;i++) particle(b.x,b.y,'#e8c170',rand(-5,5),rand(-6,2));
    shake(20); Audio2.sfx.level();
    // open return portal
    portals=[ mkPortal(b.x,b.y,'town','Return to Lastlight','#e8c170') ];
    if(player.shards>=3){ setTimeout(victory, 1200); }
    saveGame();
  }
  function victory(){
    state='victory';
    document.getElementById('infoHead').textContent='THE HOLLOW CROWN RECLAIMED';
    document.getElementById('infoBody').innerHTML=`<div class="hint" style="font-size:17px;line-height:2;text-align:center;">
      The three shards blaze together in your hands.<br>
      The Emberfall rises once more, and warmth returns to the grey world.<br><br>
      <b style="color:var(--gold)">${player.name}</b>, the Last Ember, becomes legend.<br><br>
      <span style="color:var(--mute)">Final Level ${player.level} · ${player.gold} gold · ${Object.values(player.killCount).reduce((a,b)=>a+b,0)} foes slain</span><br><br>
      You may keep playing to hunt loot, or begin anew.</div>`;
    showScreen('infoScreen'); Audio2.startMusic('town');
  }

  /* ===================================================================
     DROPS / INVENTORY
     =================================================================== */
  function collectNearbyDrops(){
    drops.slice().forEach(d=>{ if(dist(player.x,player.y,d.x,d.y)<40) collectDrop(d); });
  }
  function collectDrop(d){
    if(d.kind==='gold'){ player.gold+=d.payload; Audio2.sfx.coin(); spawnFloater(d.x,d.y-10,'+'+d.payload+'⛁','#e8c170'); }
    else if(d.kind==='item'){ addItem(d.payload); Audio2.sfx.loot(); spawnFloater(d.x,d.y-10, d.payload.name,'#'+ (d.payload.rarityColor||'#fff').slice(1));
      toast(`Looted: ${d.payload.name}`, d.payload.rarityColor); }
    else if(d.kind==='potion'){ player.potions[d.payload]=(player.potions[d.payload]||0)+1; Audio2.sfx.loot(); spawnFloater(d.x,d.y-10,'+'+d.payload+' potion','#5ad17a'); }
    drops=drops.filter(x=>x!==d); updateHUD();
  }
  function addItem(it){ if(player.inventory.length<36) player.inventory.push(it); else toast("Inventory full!", '#c0392b'); }
  function equipItem(it){
    const slot=it.slot; const prev=player.equip[slot];
    player.equip[slot]=it;
    player.inventory=player.inventory.filter(x=>x!==it);
    if(prev) player.inventory.push(prev);
    player.recomputeMax(); updateHUD();
  }
  function sellItem(it){
    const val=Math.round((it.ilvl+1)* (RARITIES.find(r=>r.key===it.rarity).mult) * 4);
    player.gold+=val; player.inventory=player.inventory.filter(x=>x!==it);
    Audio2.sfx.coin(); toast(`Sold for ${val} gold.`, '#e8c170'); updateHUD();
  }

  function setupQuests(){
    // start with the first elder quest available and scout's bounty
    if(!player.quests.q_ember) player.quests.q_ember={state:'active',progress:0};
    if(!player.quests.q_husks) player.quests.q_husks={state:'active',progress:0};
  }
  function checkQuestProgress(type, target){
    for(const [id,q] of Object.entries(QUESTS)){
      const pq=player.quests[id]; if(!pq||pq.state!=='active') continue;
      if(q.type==='kill'&&type==='kill'&&q.target===target){ pq.progress++;
        if(pq.progress>=q.count){ completeQuest(id); } else updateHUD(); }
      if(q.type==='boss'&&type==='boss'&&q.target===target){ completeQuest(id); }
    }
  }
  function completeQuest(id){
    const q=QUESTS[id]; player.quests[id].state='done';
    gainXP(q.reward.xp); player.gold+=q.reward.gold;
    Audio2.sfx.quest(); toast(`✔ Quest complete: ${q.name} (+${q.reward.xp} XP, +${q.reward.gold} gold)`, '#5ad17a');
    if(q.next && !player.quests[q.next]) player.quests[q.next]={state:'available',progress:0};
    saveGame();
  }

        {t:"I'm fine, thank you.", act:()=>{}} ]}];

  function buy(kind,cost){ if(player.gold>=cost){ player.gold-=cost; player.potions[kind]++; Audio2.sfx.coin(); toast(`Bought a ${kind} potion.`,'#e8c170'); updateHUD(); } else toast("Not enough gold.", '#c0392b'); }
  function buyGear(){ if(player.gold>=120){ player.gold-=120; const it=makeItem(player.level,null,1); addItem(it); Audio2.sfx.loot(); toast(`Bought: ${it.name}`, it.rarityColor); updateHUD(); } else toast("Not enough gold.", '#c0392b'); }

  let dialogueQueue=[], dialogueLine=null;
  function talkTo(npc){
    const tree=DIALOGUE[npc.role]; if(!tree) return;
    dialogueQueue=tree(); state='dialogue';
    showDialogueLine();
  }
  function showDialogueLine(){
    const el=document.getElementById('dialogue');
    if(dialogueQueue.length===0){ closeDialogue(); return; }
    dialogueLine=dialogueQueue[0];
    let html=`<div class="who">${dialogueLine.who}</div><div class="txt">${dialogueLine.txt}</div>`;
    if(dialogueLine.opts){ html+='<div class="opts">';
      dialogueLine.opts.forEach((o,i)=>{ html+=`<div class="opt" onclick="Game.chooseDialogue(${i})"><b>${i+1}.</b> ${o.t}</div>`; });
      html+='</div>';
    } else { html+='<div class="cont">▸ press ENTER</div>'; }
    el.innerHTML=html; el.classList.add('on'); Audio2.sfx.ui();
  }
  function advanceDialogue(){ if(dialogueLine&&dialogueLine.opts) return; dialogueQueue.shift(); showDialogueLine(); }
  function chooseDialogue(i){ if(!dialogueLine||!dialogueLine.opts||!dialogueLine.opts[i]) return;
    dialogueLine.opts[i].act(); Audio2.sfx.select(); dialogueQueue.shift(); showDialogueLine(); }
  function closeDialogue(){ document.getElementById('dialogue').classList.remove('on'); if(state==='dialogue') state='play'; dialogueLine=null; }

  /* ===================================================================
     PANELS (inventory / skills / character / quests / pause)
     =================================================================== */
  let panelTab='inventory';
  function togglePanel(tab){
    if(state==='panel'&&panelTab===tab){ closePanel(); return; }
    if(state==='dialogue') closeDialogue();
    state='panel'; panelTab=tab; showScreen('panelScreen'); renderPanel();
    Audio2.sfx.ui();
  }
  function closePanel(){ if(state!=='panel') return; state='play'; showScreen(''); hideTooltip(); Game._sellMode=false; saveGame(); }
  function renderPanel(){
    const tabs=document.getElementById('panelTabs');
    const defs=[['inventory','Inventory'],['character','Character'],['skills','Skills'],['quests','Quests'],['codex','Codex'],['pause','Menu']];
    tabs.innerHTML=defs.map(([k,l])=>`<div class="tab${k===panelTab?' sel':''}" onclick="Game.switchTab('${k}')">${l}</div>`).join('');
    const c=document.getElementById('panelContent');
    if(panelTab==='inventory') c.innerHTML=renderInventory();
    else if(panelTab==='character') c.innerHTML=renderCharacter();
    else if(panelTab==='skills') c.innerHTML=renderSkills();
    else if(panelTab==='quests') c.innerHTML=renderQuests();
    else if(panelTab==='codex') c.innerHTML=renderCodex();
    else if(panelTab==='pause') c.innerHTML=renderPause();
    bindCells();
  }
  function switchTab(k){ panelTab=k; renderPanel(); Audio2.sfx.ui(); }

  function rarityClass(r){ return r==='legend'?'legend':r==='epic'?'epic':r==='rare'?'rare':''; }
  function renderInventory(){
    let eq='<div class="equipcol"><h3 style="color:var(--gold);letter-spacing:2px;margin-bottom:10px;">Equipped</h3>';
    ['weapon','armor','trinket'].forEach(slot=>{
      const it=player.equip[slot];
      eq+=`<div class="eqslot" data-eq="${slot}">
        <div class="ic">${it?it.icon:'▫'}</div>
        <div><div class="nm" style="color:${it?it.rarityColor:'#666'}">${it?it.name:'— empty —'}</div>
        <div class="sl">${slot}</div></div></div>`;
    });
    eq+=`<div style="margin-top:14px;font-size:13px;color:var(--mute);line-height:1.8;">

      🧪 Health potions: <b>${player.potions.heal}</b><br>
      🔵 Mana potions: <b>${player.potions.mana}</b><br>

    return `<div class="invwrap">${eq}${grid}</div>`;

    warden:"Frost Wardens guard the Glacial Reliquary, weaving the cold into killing shards of ice.",
    reaver:"Cinder Reavers burn with the last rage of the Emberfall. They charge headlong, heedless of their own ruin.",
    glutton:"Hollow Gluttons devour everything — stone, bone, light. The more they eat, the slower and deadlier they grow.",
    shrieker:"Pale Shriekers wail in a frequency that splinters the mind. Silence them quickly, or go mad in the deep.",
  };
  function renderCodex(){
    let enemyHtml='';
    for(const [k,t] of Object.entries(ENEMY_TYPES)){
      const kills=player.killCount[k]||0;
      const known=kills>0;
      enemyHtml+=`<div style="padding:10px;background:#0c0f18;border:1px solid var(--line);border-radius:6px;margin-bottom:8px;${known?'':'opacity:.5'}">
        <div style="display:flex;justify-content:space-between;">
          <span style="color:${t.color};letter-spacing:1px;font-weight:600;">${known?t.name:'??? (undiscovered)'}</span>
          <span style="color:var(--mute);font-size:12px;">slain: ${kills}</span></div>
        ${known?`<div style="font-size:13px;color:var(--mute);margin-top:4px;line-height:1.5;">${CODEX_LORE[k]}</div>
        <div style="font-size:12px;color:var(--ember-soft);margin-top:4px;">❤ ${t.hp} · ⚔ ${t.dmg} · ✦ ${t.xp} XP</div>`:''}</div>`;
    }
    let bossHtml='';
    for(const [k,b] of Object.entries(BOSSES)){
      const slain=player.killCount[k]||0;
      bossHtml+=`<div style="padding:10px;background:#0c0f18;border:1px solid ${b.color};border-radius:6px;margin-bottom:8px;${slain?'':'opacity:.6'}">
        <span style="color:${b.color};letter-spacing:1px;font-weight:700;">${b.name}</span>
        <span style="color:${slain?'var(--life)':'var(--mute)'};font-size:12px;float:right;">${slain?'VANQUISHED':'at large'}</span></div>`;
    }
    return `<div style="display:flex;gap:20px;max-height:360px;">
      <div style="flex:1;overflow:auto;"><h3 style="color:var(--gold);letter-spacing:2px;margin-bottom:10px;">Bestiary</h3>${enemyHtml}</div>
      <div style="flex:1;overflow:auto;"><h3 style="color:var(--blood);letter-spacing:2px;margin-bottom:10px;">Wardens of the Crown</h3>${bossHtml}
        <div style="font-size:12px;color:var(--mute);margin-top:10px;line-height:1.6;">Three shards. Three wardens. Reclaim them all and the Hollow Queen herself will rise to stop you.</div></div>
    </div>`;
  }
  function renderPause(){
    return `<div style="text-align:center;padding:20px;">
      <div style="font-size:18px;color:var(--gold);letter-spacing:3px;margin-bottom:20px;">Game Paused</div>
      <button class="btn" style="margin:6px;width:240px;" onclick="Game.closePanel()">▶ Resume</button><br>
      <button class="btn ghost" style="margin:6px;width:240px;" onclick="Game.saveGame();Game.toast('Game saved.','#5ad17a')">💾 Save Game</button><br>
      <button class="btn ghost" style="margin:6px;width:240px;" onclick="Game.returnTownFromPause()">🏰 Return to Lastlight</button><br>
      <button class="btn ghost" style="margin:6px;width:240px;" onclick="Game.confirmQuit()">⮌ Quit to Title</button>
    </div>`;
  }
  function returnTownFromPause(){ closePanel(); fadeTransition(enterTown); }
  function confirmQuit(){ saveGame(); closePanel(); toTitle(); }

  function bindCells(){
    document.querySelectorAll('[data-inv]').forEach(el=>{
      const i=+el.getAttribute('data-inv'); const it=player.inventory[i]; if(!it) return;
      el.onmouseenter=ev=>showTooltip(it,ev);
      el.onmousemove=ev=>moveTooltip(ev);
      el.onmouseleave=hideTooltip;
      el.onclick=()=>{ if(Game._sellMode){ sellItem(it); } else { equipItem(it); Audio2.sfx.select(); } hideTooltip(); renderPanel(); };
      el.oncontextmenu=ev=>{ ev.preventDefault(); sellItem(it); hideTooltip(); renderPanel(); };
    });
    document.querySelectorAll('[data-eq]').forEach(el=>{
      const slot=el.getAttribute('data-eq'); const it=player.equip[slot]; if(!it) return;
      el.onmouseenter=ev=>showTooltip(it,ev);
      el.onmousemove=ev=>moveTooltip(ev);
      el.onmouseleave=hideTooltip;
      el.onclick=()=>{ // unequip
        if(player.inventory.length<36){ player.inventory.push(it); player.equip[slot]=null; player.recomputeMax(); Audio2.sfx.ui(); hideTooltip(); renderPanel(); updateHUD(); } };
    });
  }
  function showTooltip(it,ev){
    const tt=document.getElementById('tooltip');
    let s='';
    for(const [k,v] of Object.entries(it.stats)){ const names={dmg:'Damage',armor:'Armor',hp:'Health',mp:'Aether',str:'Strength',agi:'Agility',int:'Intellect'};
      s+=`<div class="ts">+${v} ${names[k]||k}</div>`; }
    tt.innerHTML=`<div class="tn" style="color:${it.rarityColor}">${it.name}</div>
      <div style="color:var(--mute);font-size:11px;text-transform:uppercase;">${it.rarity} ${it.slot} · ilvl ${it.ilvl}</div>
      ${s}${it.legendary?`<div class="td" style="color:var(--gold)">"${it.legendary}"</div>`:''}`;
    tt.style.display='block'; moveTooltip(ev);
  }
  function moveTooltip(ev){ const tt=document.getElementById('tooltip');
    tt.style.left=Math.min(ev.clientX+16, innerWidth-260)+'px'; tt.style.top=Math.min(ev.clientY+16, innerHeight-160)+'px'; }
  function hideTooltip(){ document.getElementById('tooltip').style.display='none'; }

  /* ===================================================================
     HUD / TOAST / FX
     =================================================================== */
  function updateHUD(){
    if(!player) return;
    document.getElementById('hpFill').style.width=clamp(player.hp/player.maxhp*100,0,100)+'%';
    document.getElementById('mpFill').style.width=clamp(player.mp/player.maxmp*100,0,100)+'%';
    document.getElementById('xpFill').style.width=clamp(player.xp/player.xpNext*100,0,100)+'%';
    document.getElementById('hpLab').textContent=`❤ ${Math.round(player.hp)} / ${Math.round(player.maxhp)}`;
    document.getElementById('mpLab').textContent=`✦ ${Math.round(player.mp)} / ${Math.round(player.maxmp)}`;
    document.getElementById('coinLab').textContent=`⛁ ${player.gold}`;
    document.getElementById('lvlLab').textContent=`Lv ${player.level}  ·  ✦${player.shards}/3`;
    renderAbilityBar();
  }
  function renderAbilityBar(){
    const bar=document.getElementById('abilityBar'); bar.innerHTML='';
    player.abilitySlots.forEach((key,i)=>{
      const ab=ABILITIES[key]; const cd=player.cds[i];
      const ready=cd<=0 && player.mp>=ab.cost;
      const d=document.createElement('div');
      d.className='slot'+(ready?' ready':'');
      d.innerHTML=`<span class="key">${ab.key}</span>${ab.icon}${cd>0?`<div class="cd">${cd.toFixed(1)}</div>`:''}`;
      d.title=`${ab.name} — ${ab.desc} (${ab.cost} aether)`;
      bar.appendChild(d);
    });
    // potions indicator
    const ph=document.createElement('div'); ph.className='slot'; ph.style.opacity=.8;
    ph.innerHTML=`<span class="key">1</span>🧪<div class="ct" style="position:absolute;bottom:1px;right:4px;font-size:11px;color:var(--life)">${player.potions.heal}</div>`;
    bar.appendChild(ph);
    const pm=document.createElement('div'); pm.className='slot'; pm.style.opacity=.8;
    pm.innerHTML=`<span class="key">2</span>🔵<div class="ct" style="position:absolute;bottom:1px;right:4px;font-size:11px;color:var(--mana)">${player.potions.mana}</div>`;
    bar.appendChild(pm);
  }
  function toast(text,color='#d8dae6'){
    const t=document.createElement('div'); t.className='toast'; t.textContent=text; t.style.color=color; t.style.borderColor=color+'66';
    document.getElementById('toasts').appendChild(t);
    setTimeout(()=>t.remove(),2600);
  }
  function shake(mag){ if(!opt.screenShake) return; shakeMag=Math.max(shakeMag,mag); shakeT=0.3; }
  function flashScreen(){ flashT=0.12; }
  function particle(x,y,color,vx,vy){ particles.push({x,y,vx,vy,color,life:rand(0.4,0.9),t:0,r:rand(2,4)}); }
  function fadeTransition(cb){
    const fb=document.getElementById('fadeBlack'); fb.classList.add('on');
    setTimeout(()=>{ cb(); setTimeout(()=>fb.classList.remove('on'),120); }, 360);
  }

  // API object passed to abilities
  const GameAPI={ meleeArc, projectile, nova, cloud, ring, enemiesInRange, particle, shake,
    solidAt:(x,y)=>solidAt(x,y) };

  /* ===================================================================
     UPDATE
     =================================================================== */
  function update(dt){
    if(state!=='play') { // still tick particles in some states for flavor on cine? no.
      return;
    }
    runTimer+=dt; player.anim+=dt*8;
    // regen
    player.hp=clamp(player.hp+player.hpRegen*dt*(player.skills.toughness?1.5:1)*(player.skills.juggernaut?1.5:1),0,player.maxhp);
    const mpRate=player.mpRegen*(player.skills.flow?2:1)*(player.buffs.guard>0?1:1);
    player.mp=clamp(player.mp+mpRate*dt,0,player.maxmp);
    // timers
    player.attackCd=Math.max(0,player.attackCd-dt);
    player.iframes=Math.max(0,player.iframes-dt);
    for(let i=0;i<3;i++) player.cds[i]=Math.max(0,player.cds[i]-dt);
    for(const b in player.buffs){ player.buffs[b]-=dt; if(player.buffs[b]<=0) delete player.buffs[b]; }
    if(player.swipe){ player.swipe.t-=dt; if(player.swipe.t<=0) player.swipe=null; }

    // movement
    let mx=0,my=0;
    if(keys['w']||keys['arrowup']) my-=1;
    if(keys['s']||keys['arrowdown']) my+=1;
    if(keys['a']||keys['arrowleft']) mx-=1;
    if(keys['d']||keys['arrowright']) mx+=1;
    // facing toward mouse
    const wmx=mouse.x+cam.x, wmy=mouse.y+cam.y;
    player.facing=Math.atan2(wmy-player.y, wmx-player.x);

    if(player.dashTime>0){
      player.dashTime-=dt;
      const nx=player.x+player.dashVec.x*player.dashSpeed*dt;
      const ny=player.y+player.dashVec.y*player.dashSpeed*dt;
      if(!solidAt(nx,player.y)) player.x=nx;
      if(!solidAt(player.x,ny)) player.y=ny;
      // damage along the way
      enemiesInRange(player.x,player.y,player.r+16).forEach(e=>{ if(!e._charged){ e._charged=true; damageEnemy(e,player.dashDmg,player); e.stun=1; e.knock.x+=player.dashVec.x*6; e.knock.y+=player.dashVec.y*6; }});
      particle(player.x,player.y,player.color,rand(-1,1),rand(-1,1));
      if(player.dashTime<=0){ enemies.forEach(e=>e._charged=false); if(player.skills.phantom) player.iframes=Math.max(player.iframes,0.5); }
    } else if(mx||my){
      const len=Math.hypot(mx,my); mx/=len; my/=len;
      const sp=player.moveSpeed()*60;
      const nx=player.x+mx*sp*dt, ny=player.y+my*sp*dt;
      if(!solidAt(nx,player.y-player.r*0.5)&&!solidAt(nx,player.y+player.r*0.5)) player.x=nx;
      if(!solidAt(player.x-player.r*0.5,ny)&&!solidAt(player.x+player.r*0.5,ny)) player.y=ny;
    }
    // attack
    if(player.attackHeld||keys[' ']) basicAttack();

    // burn aura
    if(player.buffs.burnAura>0){ enemiesInRange(player.x,player.y,60).forEach(e=>{ if(chance(0.3*dt*60/60)) {} ; e.hp-=8*dt; e.hitFlash=0.05; if(e.hp<=0)killEnemy(e); }); }

    updateEnemies(dt);
    if(boss) updateBoss(dt);
    updateProjectiles(dt);
    updateParticles(dt);
    updateDrops(dt);
    updateFloaters(dt);
    portals.forEach(p=>p.anim+=dt);

    // camera follow with easing
    camTarget.x=player.x-W/2; camTarget.y=player.y-H/2;
    cam.x=lerp(cam.x,camTarget.x,1-Math.pow(0.001,dt));
    cam.y=lerp(cam.y,camTarget.y,1-Math.pow(0.001,dt));
    const mapW=world.w*TILE, mapH=world.h*TILE;
    cam.x=clamp(cam.x,0,Math.max(0,mapW-W)); cam.y=clamp(cam.y,0,Math.max(0,mapH-H));

    if(shakeT>0){ shakeT-=dt; if(shakeT<=0) shakeMag=0; }
    if(flashT>0){ flashT-=dt; document.getElementById('dmgflash').style.opacity=Math.max(0,flashT/0.12); }
    else document.getElementById('dmgflash').style.opacity=0;

    updateHUD();
  }

  function updateEnemies(dt){
    enemies.forEach(e=>{
      e.anim+=dt*6; e.hitFlash=Math.max(0,e.hitFlash-dt);
      // status
      if(e.freeze>0){ e.freeze-=dt; }
      if(e.stun>0){ e.stun-=dt; }
      if(e.poison>0){ e.poison-=dt; e.poisonT-=dt; if(e.poisonT<=0){ e.poisonT=0.5; e.hp-=6; e.hitFlash=0.05; spawnFloater(e.x,e.y-e.r,'6','#7CFC00'); if(e.hp<=0){killEnemy(e); return;} } }
      // knockback
      e.x+=e.knock.x; e.y+=e.knock.y; e.knock.x*=0.8; e.knock.y*=0.8;
      if(solidAt(e.x,e.y)){ e.x-=e.knock.x; e.y-=e.knock.y; }
      if(e.freeze>0||e.stun>0) return;
      const d=dist(e.x,e.y,player.x,player.y);
      const ang=Math.atan2(player.y-e.y,player.x-e.x);
      const sp=e.speed*48*dt;
      if(e.ai==='chase'){
        if(d>e.r+player.r-2) moveEnemy(e,Math.cos(ang)*sp,Math.sin(ang)*sp);
        if(d<e.r+player.r+4){ e.atkCd-=dt; if(e.atkCd<=0){ e.atkCd=1; hurtPlayer(e.dmg, e.x,e.y); } }
      } else if(e.ai==='orbit'){
        e.orbA+=dt*2; const tx=player.x+Math.cos(e.orbA)*90, ty=player.y+Math.sin(e.orbA)*90;
        const a2=Math.atan2(ty-e.y,tx-e.x); moveEnemy(e,Math.cos(a2)*sp,Math.sin(a2)*sp);
        if(d<e.r+player.r+10){ e.atkCd-=dt; if(e.atkCd<=0){ e.atkCd=1.3; hurtPlayer(e.dmg,e.x,e.y); } }
      } else if(e.ai==='ranged'){
        if(d>220) moveEnemy(e,Math.cos(ang)*sp,Math.sin(ang)*sp);
        else if(d<150) moveEnemy(e,-Math.cos(ang)*sp,-Math.sin(ang)*sp);
        e.atkCd-=dt; if(e.atkCd<=0&&d<360){ e.atkCd=1.8; enemyProjectile(e,ang); }
      } else if(e.ai==='caster'){
        if(d>200) moveEnemy(e,Math.cos(ang)*sp,Math.sin(ang)*sp);
        else if(d<140) moveEnemy(e,-Math.cos(ang)*sp,-Math.sin(ang)*sp);
        e.atkCd-=dt; if(e.atkCd<=0&&d<400){ e.atkCd=2.4; for(let i=-1;i<=1;i++) enemyProjectile(e,ang+i*0.25); }
      }
    });
    // separate overlapping enemies
    for(let i=0;i<enemies.length;i++) for(let j=i+1;j<enemies.length;j++){
      const a=enemies[i],b=enemies[j]; const d=dist(a.x,a.y,b.x,b.y); const min=a.r+b.r;
      if(d<min&&d>0){ const push=(min-d)/2, ang=Math.atan2(b.y-a.y,b.x-a.x);
        a.x-=Math.cos(ang)*push*0.5; a.y-=Math.sin(ang)*push*0.5;
        b.x+=Math.cos(ang)*push*0.5; b.y+=Math.sin(ang)*push*0.5; }
    }
  }
  function moveEnemy(e,dx,dy){ if(!solidAt(e.x+dx,e.y)) e.x+=dx; if(!solidAt(e.x,e.y+dy)) e.y+=dy; }
  function enemyProjectile(e,ang){ projectiles.push({x:e.x,y:e.y,vx:Math.cos(ang)*260,vy:Math.sin(ang)*260,
    dmg:e.dmg,color:e.color,friendly:false,r:6,life:2.5,hits:[]}); Audio2.sfx.fire(); }

  function updateBoss(dt){
    const b=boss; b.anim+=dt*4; b.hitFlash=Math.max(0,b.hitFlash-dt);
    if(b.freeze>0)b.freeze-=dt; if(b.stun>0)b.stun-=dt;
    if(b.poison>0){ b.poison-=dt; b.poisonT-=dt; if(b.poisonT<=0){b.poisonT=0.5; b.hp-=12; if(b.hp<=0){killEnemy(b);return;}} }
    document.getElementById('bossFill').style.width=clamp(b.hp/b.maxhp*100,0,100)+'%';
    if(b.hp<b.maxhp*0.3&&!b.enrage){ b.enrage=true; b.speed*=1.4; b.dmg*=1.2; toast(b.name.split(',')[0]+" enrages!", '#c0392b'); shake(10); }
    if(b.freeze>0||b.stun>0) return;
    b.x+=b.knock.x; b.y+=b.knock.y; b.knock.x*=0.85; b.knock.y*=0.85;
    b.phaseT-=dt;
    const d=dist(b.x,b.y,player.x,player.y);
    const ang=Math.atan2(player.y-b.y,player.x-b.x);
    const sp=b.speed*44*dt;
    const phase=b.phases[b.phase];
    if(phase==='chase'){
      if(d>b.r+player.r) moveEnemy(b,Math.cos(ang)*sp,Math.sin(ang)*sp);
      if(d<b.r+player.r+10){ b.atkCd-=dt; if(b.atkCd<=0){ b.atkCd=0.9; hurtPlayer(b.dmg,b.x,b.y); } }
    } else if(phase==='barrage'){
      b.atkCd-=dt; if(b.atkCd<=0){ b.atkCd=0.5; for(let i=0;i<8;i++){ const a=b.anim+i*Math.PI/4; projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*200,vy:Math.sin(a)*200,dmg:b.dmg*0.6,color:b.color,friendly:false,r:7,life:3,hits:[]}); } Audio2.sfx.fire(); }
    } else if(phase==='summon'){
      b.atkCd-=dt; if(b.atkCd<=0){ b.atkCd=1.4; const B=BIOMES[BOSSES[b.key].biome]; for(let i=0;i<2;i++){ const p=randFloorTile(world); spawnEnemy(pick(B.enemies),p.x,p.y,player.level); } Audio2.sfx.portal(); }
      moveEnemy(b,Math.cos(ang)*sp*0.4,Math.sin(ang)*sp*0.4);
    } else if(phase==='slam'){
      if(d>b.r+player.r+6) moveEnemy(b,Math.cos(ang)*sp*1.3,Math.sin(ang)*sp*1.3);
      else { b.atkCd-=dt; if(b.atkCd<=0){ b.atkCd=1.6; nova(b.x,b.y,110,b.color,0); enemiesInRange(b.x,b.y,110); if(d<120){ hurtPlayer(b.dmg*1.4,b.x,b.y);} shake(12); Audio2.sfx.boss(); } }
    } else if(phase==='teleport'){
      b.atkCd-=dt; if(b.atkCd<=0){ b.atkCd=2; const p=randFloorTile(world); ring(b.x,b.y,b.color); b.x=p.x; b.y=p.y; ring(b.x,b.y,b.color); Audio2.sfx.portal();
        for(let i=0;i<6;i++){ const a=i*Math.PI/3; projectiles.push({x:b.x,y:b.y,vx:Math.cos(a)*220,vy:Math.sin(a)*220,dmg:b.dmg*0.7,color:b.color,friendly:false,r:7,life:3,hits:[]}); } }
    }
    if(b.phaseT<=0){ b.phase=(b.phase+1)%b.phases.length; b.phaseT=rand(3,5); b.atkCd=0.5; }
  }

  function updateProjectiles(dt){
    projectiles.forEach(p=>{
      p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
      particle(p.x,p.y,p.color,0,0);
      if(solidAt(p.x,p.y)){ p.life=0; for(let i=0;i<5;i++) particle(p.x,p.y,p.color,rand(-2,2),rand(-2,2)); }
      if(p.friendly){
        const targets=boss?[...enemies,boss]:enemies;
        targets.forEach(e=>{ if(e.hp>0&&!p.hits.includes(e)&&dist(p.x,p.y,e.x,e.y)<p.r+e.r){
          damageEnemy(e,p.dmg,player); p.hits.push(e); if(!p.pierce) p.life=0; } });
      } else {
        if(dist(p.x,p.y,player.x,player.y)<p.r+player.r){ hurtPlayer(p.dmg,p.x,p.y); p.life=0; }
      }
    });
    projectiles=projectiles.filter(p=>p.life>0);
  }
  function updateParticles(dt){
    particles.forEach(p=>{
      if(p.cloud){ p.t+=dt; p.dur-=dt; enemiesInRange(p.x,p.y,p.r).forEach(e=>{ e.hp-=p.dps*dt; if(e.hp<=0)killEnemy(e);}); return; }
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.t+=dt;
    });
    particles=particles.filter(p=> p.cloud? p.dur>0 : p.t<p.life);
  }
  function updateDrops(dt){
    drops.forEach(d=>{ d.anim+=dt*4; d.life-=dt; d.x+=d.vx; d.y+=d.vy; d.vx*=0.9; d.vy*=0.9;
      // magnet
      const dd=dist(d.x,d.y,player.x,player.y);
      if(dd<70){ const a=Math.atan2(player.y-d.y,player.x-d.x); d.x+=Math.cos(a)*120*dt; d.y+=Math.sin(a)*120*dt; }
      if(dd<26) collectDrop(d);
    });
    drops=drops.filter(d=>d.life>0);
  }
  function updateFloaters(dt){
    floaters.forEach(f=>{ f.t+=dt; if(f.ring){ f.r+=dt*120; } else { f.y+=f.vy; } });
    floaters=floaters.filter(f=> f.ring? f.r<f.max : f.t<1);
  }

  /* ===================================================================
     RENDER
     =================================================================== */
  function render(){
    ctx.save();
    let sx=0,sy=0;
    if(shakeT>0){ sx=rand(-shakeMag,shakeMag); sy=rand(-shakeMag,shakeMag); }
    ctx.translate(-cam.x+sx,-cam.y+sy);

    drawMap();
    // drops
    drops.forEach(d=>drawDrop(d));
    chests.forEach(c=>drawChest(c));
    portals.forEach(p=>drawPortal(p));
    npcs.forEach(n=>drawNPC(n));
    // particles (behind entities)
    particles.forEach(p=>drawParticle(p));
    enemies.forEach(e=>drawEnemy(e));
    if(boss) drawBoss(boss);
    drawPlayer();
    floaters.forEach(f=>drawFloater(f));

    ctx.restore();
    drawMinimap();
  }

  function drawMap(){
    const startX=Math.floor(cam.x/TILE), startY=Math.floor(cam.y/TILE);
    const endX=startX+Math.ceil(W/TILE)+1, endY=startY+Math.ceil(H/TILE)+1;
    const B=world.biome;
    for(let y=startY;y<endY;y++) for(let x=startX;x<endX;x++){
      if(!world.grid[y]||world.grid[y][x]===undefined) continue;
      const t=world.grid[y][x]; const px=x*TILE, py=y*TILE;
      if(t===1){
        ctx.fillStyle=B.wall; ctx.fillRect(px,py,TILE,TILE);
        ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(px,py,TILE,3);
        ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.strokeRect(px+0.5,py+0.5,TILE-1,TILE-1);
      } else {
        // floor with subtle checker
        const shade=((x+y)&1)?0:1;
        ctx.fillStyle=B.floor; ctx.fillRect(px,py,TILE,TILE);
        if(shade){ ctx.fillStyle='rgba(255,255,255,0.015)'; ctx.fillRect(px,py,TILE,TILE); }
        if(t===2){ // decoration
          ctx.fillStyle=B.accent; ctx.globalAlpha=0.5;
          ctx.beginPath(); ctx.arc(px+TILE/2,py+TILE/2,4,0,6.28); ctx.fill(); ctx.globalAlpha=1;
        }
      }
    }
  }

  function shapeColor(base, flash){ return flash>0? '#ffffff' : base; }

  function drawEnemy(e){
    const col=shapeColor(e.color,e.hitFlash);
    ctx.save(); ctx.translate(e.x,e.y);
    const bob=Math.sin(e.anim)*2;
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.beginPath(); ctx.ellipse(0,e.r*0.8,e.r*0.9,e.r*0.4,0,0,6.28); ctx.fill();
    if(e.freeze>0){ ctx.globalAlpha=0.85; }
    ctx.translate(0,bob);
    ctx.fillStyle=e.freeze>0?'#9fe8ff':col;
    if(e.shape==='blob'){
      ctx.beginPath(); ctx.arc(0,0,e.r,0,6.28); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.arc(-e.r*0.3,-e.r*0.2,2.5,0,6.28); ctx.arc(e.r*0.3,-e.r*0.2,2.5,0,6.28); ctx.fill();
    } else if(e.shape==='orb'){
      const g=ctx.createRadialGradient(0,0,2,0,0,e.r); g.addColorStop(0,'#fff'); g.addColorStop(0.5,col); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,e.r,0,6.28); ctx.fill();
    } else if(e.shape==='tri'){
      ctx.beginPath(); ctx.moveTo(0,-e.r); ctx.lineTo(e.r,e.r); ctx.lineTo(-e.r,e.r); ctx.closePath(); ctx.fill();
    } else if(e.shape==='spike'){
      ctx.beginPath(); for(let i=0;i<8;i++){ const a=i/8*6.28; const rr=i%2?e.r:e.r*0.5; ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);} ctx.closePath(); ctx.fill();
    }
    if(e.poison>0){ ctx.fillStyle='rgba(124,252,0,0.3)'; ctx.beginPath(); ctx.arc(0,0,e.r+2,0,6.28); ctx.fill(); }
    ctx.restore();
    // hp bar
    if(e.hp<e.maxhp){ ctx.fillStyle='#000a'; ctx.fillRect(e.x-e.r,e.y-e.r-9,e.r*2,4);
      ctx.fillStyle='#c0392b'; ctx.fillRect(e.x-e.r,e.y-e.r-9,e.r*2*(e.hp/e.maxhp),4); }
  }
  function drawBoss(b){
    ctx.save(); ctx.translate(b.x,b.y);
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0,b.r*0.8,b.r,b.r*0.4,0,0,6.28); ctx.fill();
    const pulse=1+Math.sin(b.anim*2)*0.05;
    // aura
    const g=ctx.createRadialGradient(0,0,b.r*0.5,0,0,b.r*2); g.addColorStop(0,b.color+'88'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,b.r*2,0,6.28); ctx.fill();
    ctx.fillStyle=b.hitFlash>0?'#fff':(b.enrage?'#ff3b2f':b.color);
    ctx.beginPath(); for(let i=0;i<10;i++){ const a=i/10*6.28+b.anim*0.3; const rr=(i%2?b.r:b.r*0.65)*pulse; ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);} ctx.closePath(); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(-b.r*0.3,-b.r*0.1,4,0,6.28); ctx.arc(b.r*0.3,-b.r*0.1,4,0,6.28); ctx.fill();
    ctx.fillStyle=b.color; ctx.beginPath(); ctx.arc(-b.r*0.3,-b.r*0.1,2,0,6.28); ctx.arc(b.r*0.3,-b.r*0.1,2,0,6.28); ctx.fill();
    ctx.restore();
  }
  function drawPlayer(){
    const p=player; ctx.save(); ctx.translate(p.x,p.y);
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(0,p.r*0.8,p.r,p.r*0.4,0,0,6.28); ctx.fill();
    // swipe arc
    if(p.swipe){ ctx.save(); ctx.rotate(p.swipe.ang); ctx.globalAlpha=p.swipe.t/0.18*0.6;
      ctx.strokeStyle=p.color; ctx.lineWidth=5; ctx.beginPath();
      ctx.arc(0,0,p.swipe.range,-p.swipe.arc/2,p.swipe.arc/2); ctx.stroke(); ctx.restore(); }
    if(p.buffs.guard>0){ ctx.strokeStyle='#ff6b35'; ctx.lineWidth=3; ctx.globalAlpha=0.6+Math.sin(p.anim)*0.2;
      ctx.beginPath(); ctx.arc(0,0,p.r+6,0,6.28); ctx.stroke(); ctx.globalAlpha=1; }
    // body
    ctx.fillStyle=p.iframes>0&&Math.floor(p.anim*2)%2? '#ffffff' : p.color;
    ctx.beginPath(); ctx.arc(0,0,p.r,0,6.28); ctx.fill();
    ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.stroke();
    // direction indicator (weapon)
    ctx.rotate(p.facing);
    ctx.fillStyle='#e8e8ee'; ctx.fillRect(p.r-2,-2,12,4);
    // eyes
    ctx.restore();
    // name
    ctx.fillStyle='#fff'; ctx.font='11px sans-serif'; ctx.textAlign='center';
    ctx.fillText(p.name, p.x, p.y-p.r-8);
    ctx.textAlign='left';
  }
  function drawNPC(n){
    ctx.save(); ctx.translate(n.x,n.y);
    const bob=Math.sin(now()/400+n.x)*2;
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,14,12,5,0,0,6.28); ctx.fill();
    ctx.font='26px sans-serif'; ctx.textAlign='center'; ctx.fillText(n.icon,0,8+bob);
    // interaction prompt
    if(player&&dist(player.x,player.y,n.x,n.y)<60){
      ctx.fillStyle='#e8c170'; ctx.font='11px sans-serif'; ctx.fillText('▼ '+n.name,0,-20);
      ctx.fillStyle='#fff'; ctx.fillText('[F] talk',0,-8);
    } else { ctx.fillStyle='#8a90a6'; ctx.font='10px sans-serif'; ctx.fillText(n.name,0,-18); }
    ctx.textAlign='left'; ctx.restore();
  }
  function drawPortal(p){
    ctx.save(); ctx.translate(p.x,p.y);
    const rings=3;
    for(let i=0;i<rings;i++){ const r=p.r*(0.5+i*0.35)+Math.sin(p.anim*2+i)*3;
      ctx.strokeStyle=p.locked?'#555':p.color; ctx.globalAlpha=0.5-i*0.12; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,0,r,p.anim+i,p.anim+i+5); ctx.stroke(); }
    ctx.globalAlpha=0.3; const g=ctx.createRadialGradient(0,0,2,0,0,p.r); g.addColorStop(0,p.locked?'#333':p.color); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,p.r,0,6.28); ctx.fill(); ctx.globalAlpha=1;
    ctx.restore();
    if(player&&dist(player.x,player.y,p.x,p.y)<60){
      ctx.fillStyle=p.locked?'#c0392b':'#e8c170'; ctx.font='11px sans-serif'; ctx.textAlign='center';
      ctx.fillText(p.label,p.x,p.y-p.r-14);
      ctx.fillStyle='#fff'; ctx.fillText(p.locked?'[sealed]':'[F] enter',p.x,p.y-p.r-2); ctx.textAlign='left';
    }
  }
  function drawChest(c){
    ctx.save(); ctx.translate(c.x,c.y);
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,10,12,4,0,0,6.28); ctx.fill();
    ctx.font='22px sans-serif'; ctx.textAlign='center'; ctx.fillText(c.opened?'📭':'🎁',0,6);
    if(!c.opened&&player&&dist(player.x,player.y,c.x,c.y)<60){ ctx.fillStyle='#e8c170'; ctx.font='10px sans-serif'; ctx.fillText('[F] open',0,-14); }
    ctx.textAlign='left'; ctx.restore();
  }
  function drawDrop(d){
    ctx.save(); ctx.translate(d.x,d.y+Math.sin(d.anim)*2);
    if(d.kind==='gold'){ ctx.fillStyle='#e8c170'; ctx.beginPath(); ctx.arc(0,0,5,0,6.28); ctx.fill();
      ctx.strokeStyle='#9c7b3a'; ctx.stroke(); }
    else if(d.kind==='item'){ ctx.fillStyle=d.payload.rarityColor; ctx.globalAlpha=0.4; ctx.beginPath(); ctx.arc(0,0,11,0,6.28); ctx.fill(); ctx.globalAlpha=1;
      ctx.font='16px sans-serif'; ctx.textAlign='center'; ctx.fillText(d.payload.icon,0,5); ctx.textAlign='left'; }
    else if(d.kind==='potion'){ ctx.font='16px sans-serif'; ctx.textAlign='center'; ctx.fillText('🧪',0,5); ctx.textAlign='left'; }
    ctx.restore();
  }
  function drawParticle(p){
    if(p.cloud){ ctx.globalAlpha=0.18; ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); ctx.globalAlpha=1; return; }
    ctx.globalAlpha=clamp(1-p.t/p.life,0,1); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); ctx.globalAlpha=1;
  }
  function drawFloater(f){
    if(f.ring){ ctx.globalAlpha=clamp(1-f.r/f.max,0,1); ctx.strokeStyle=f.color; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,6.28); ctx.stroke(); ctx.globalAlpha=1; return; }
    ctx.globalAlpha=clamp(1-f.t,0,1); ctx.fillStyle=f.color; ctx.font=(f.big?'bold 18px':'13px')+' sans-serif';
    ctx.textAlign='center'; ctx.fillText(f.text,f.x,f.y); ctx.textAlign='left'; ctx.globalAlpha=1;
  }

  function drawMinimap(){
    const s=mini.width/(world.w); const s2=mini.height/(world.h);
    mctx.clearRect(0,0,mini.width,mini.height);
    mctx.fillStyle='#05060a'; mctx.fillRect(0,0,mini.width,mini.height);
    for(let y=0;y<world.h;y++) for(let x=0;x<world.w;x++){
      const t=world.grid[y][x];
      if(t===1) mctx.fillStyle=world.biome.wall;
      else mctx.fillStyle=world.biome.floor;
      mctx.fillRect(x*s,y*s2,s+0.5,s2+0.5);
    }
    // enemies
    mctx.fillStyle='#c0392b';
    enemies.forEach(e=>mctx.fillRect(e.x/TILE*s-1,e.y/TILE*s2-1,2,2));
    if(boss){ mctx.fillStyle='#ff3b2f'; mctx.fillRect(boss.x/TILE*s-2,boss.y/TILE*s2-2,4,4); }
    // npcs / portals
    mctx.fillStyle='#5ad17a'; npcs.forEach(n=>mctx.fillRect(n.x/TILE*s-1,n.y/TILE*s2-1,2,2));
    mctx.fillStyle='#e8c170'; portals.forEach(p=>mctx.fillRect(p.x/TILE*s-1.5,p.y/TILE*s2-1.5,3,3));
    chests.forEach(c=>{ if(!c.opened){ mctx.fillStyle='#e8c170'; mctx.fillRect(c.x/TILE*s-1,c.y/TILE*s2-1,2,2);} });
    // player
    mctx.fillStyle='#fff'; mctx.fillRect(player.x/TILE*s-1.5,player.y/TILE*s2-1.5,3,3);
  }

  /* ---------- title background animation ---------- */
  let stars=[];
  function initStars(){ stars=[]; for(let i=0;i<120;i++) stars.push({x:rand(0,W),y:rand(0,H),z:rand(0.3,1),s:rand(0.5,2)}); }
  function drawTitleBg(){
    ctx.fillStyle='#05060a'; ctx.fillRect(0,0,W,H);
    // embers rising
    stars.forEach(st=>{ st.y-=st.z*0.4; if(st.y<0){ st.y=H; st.x=rand(0,W); }
      ctx.globalAlpha=st.z; ctx.fillStyle= st.z>0.7?'#ff6b35':'#e8c170';
      ctx.beginPath(); ctx.arc(st.x,st.y,st.s,0,6.28); ctx.fill(); ctx.globalAlpha=1; });
    // glow at bottom
    const g=ctx.createLinearGradient(0,H,0,H*0.5); g.addColorStop(0,'rgba(255,107,53,0.25)'); g.addColorStop(1,'transparent');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }

  /* ===================================================================
     MAIN LOOP
     =================================================================== */
  function loop(){
    const t=now(); let dt=(t-last)/1000; last=t; dt=Math.min(dt,0.05);
    if(state==='play') update(dt);
    // render
    if(state==='play'||state==='dialogue'||state==='panel'||state==='dead'){ render(); }
    else { drawTitleBg(); }
    if(state==='dead'){ ctx.fillStyle='rgba(120,0,0,0.35)'; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='#fff'; ctx.font='bold 48px sans-serif'; ctx.textAlign='center';
      ctx.fillText('YOU HAVE FALLEN', W/2, H/2-10);
      ctx.font='18px sans-serif'; ctx.fillStyle='#e8c170'; ctx.fillText('press ENTER to awaken in Lastlight', W/2, H/2+30);
      ctx.textAlign='left'; }
    requestAnimationFrame(loop);
  }

  /* ---------------- boot ---------------- */
  function boot(){
    initStars(); buildTitleMenu(); toTitle();
    requestAnimationFrame(loop);
    // autosave periodically
    setInterval(()=>{ if(state==='play') saveGame(); }, 20000);
  }

  // public
  return { boot, toTitle, toClassSelect, beginStory, showInfo, showOptions, setOption, eraseSave,
    chooseDialogue, switchTab, togglePanel, closePanel, buySkill, saveGame, toast,
    returnTownFromPause, confirmQuit, _pendingName:'', _sellMode:false };
})();

// Expose Game on window so inline onclick="Game.*()" handlers can resolve it.
// (A top-level `const` lives in the lexical scope, not on window, and inline
// HTML event attributes look names up on the window object.)
window.Game = Game;
window.addEventListener('load',()=>Game.boot());

// Resume audio on the very first user interaction (click, key, or touch),
// satisfying the browser autoplay policy without console warnings.
(function(){
  function go(){ Audio2.unlock();
    window.removeEventListener('pointerdown',go);
    window.removeEventListener('keydown',go);
    window.removeEventListener('touchstart',go);
  }
  window.addEventListener('pointerdown',go);
  window.addEventListener('keydown',go);
  window.addEventListener('touchstart',go);
})();
</script>
</body>
</html>
